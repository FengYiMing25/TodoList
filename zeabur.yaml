services:
  - name: todo-server
    type: web
    source:
      type: dockerfile
      path: server/Dockerfile
    env:
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      DATA_DIR: /app/data
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: 10485760
    volumes:
      - name: data
        mountPath: /app/data
      - name: uploads
        mountPath: /app/uploads

  - name: todo-client
    type: web
    source:
      type: dockerfile
      path: client/Dockerfile
    env:
      VITE_API_URL: ${todo-server.URL}/api

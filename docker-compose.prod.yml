services:
  server:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${SERVER_PORT:-3001}
      JWT_SECRET: ${JWT_SECRET}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      DATA_DIR: /app/data
      UPLOAD_DIR: /app/uploads
    expose:
      - "${SERVER_PORT:-3001}"
    volumes:
      - todo_data:/app/data
      - todo_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${SERVER_PORT:-3001}/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: /api
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  todo_data:
  todo_uploads:
